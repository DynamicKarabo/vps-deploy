name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Run go vet
        run: go vet ./...
      - name: Run go build
        run: GOTOOLCHAIN=go1.23.6 go build ./...
